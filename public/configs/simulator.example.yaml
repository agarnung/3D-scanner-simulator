# ============================================================================
# CONFIGURACIÓN DE EJEMPLO - SIMULADOR DE ESCÁNER 3D GENERALIZADO
# ============================================================================
# Este archivo muestra todas las opciones disponibles para configurar
# el simulador con múltiples sensores, movimientos complejos, etc.
# ============================================================================

# ----------------------------------------------------------------------------
# CONFIGURACIÓN DE ESCENA
# ----------------------------------------------------------------------------
scene:
  backgroundColor: '#222222'  # Color de fondo de la escena
  fog:
    color: '#aaaaaa'          # Color de la niebla
    near: 1                   # Distancia cercana de la niebla
    far: 100                  # Distancia lejana de la niebla

# ----------------------------------------------------------------------------
# CONFIGURACIÓN DE CÁMARA
# ----------------------------------------------------------------------------
camera:
  fov: 25                     # Campo de visión (grados)
  near: 0.01                  # Plano cercano de recorte
  far: 100                    # Plano lejano de recorte
  position: [0, 0, 10]        # Posición inicial [x, y, z]
  lookAt: [0, 0, 0]           # Punto al que mira la cámara [x, y, z]

# ----------------------------------------------------------------------------
# CONFIGURACIÓN DE LUCES
# ----------------------------------------------------------------------------
lights:
  - type: ambient             # Luz ambiental (ilumina todo uniformemente)
    color: '#ffffff'
    intensity: 0.5
  - type: directional          # Luz direccional (simula sol)
    color: '#ffffff'
    intensity: 0.8
    position: [10, 10, 10]
  - type: directional          # Segunda luz direccional (relleno)
    color: '#ffffff'
    intensity: 0.2
    position: [-15, -5, -15]

# ----------------------------------------------------------------------------
# MODELOS 3D
# ----------------------------------------------------------------------------
models:
  # Modelo del objeto a escanear (rueda, pieza, etc.)
  object: '/models/wheel_lowpoly.glb'
  # scale: 1.0  # Factor de escala opcional para el objeto (por defecto 1.0)
  #            # Si el modelo es muy grande o pequeño, ajusta este valor
  #            # Ejemplo: scale: 0.5 para reducir a la mitad, scale: 2.0 para duplicar

# ----------------------------------------------------------------------------
# CONFIGURACIÓN DE SENSORES
# ----------------------------------------------------------------------------
# Puedes definir múltiples sensores. Cada sensor tiene:
# - id: identificador único
# - model: ruta al modelo 3D del sensor (para visualización)
# - pointsPerProfile: resolución del láser (número de puntos por perfil)
# - pose: posición y orientación inicial del sensor
# - roi: región de interés (área de escaneo del sensor)
# - movements: movimientos opcionales del sensor durante el escaneo
# ----------------------------------------------------------------------------
sensors:
  # Sensor 1: Sensor fijo en posición estándar
  - id: 'sensor_1'
    model: '/models/gocator.glb'
    # scale: 1.0  # Factor de escala opcional para este sensor (por defecto 1.0)
    pointsPerProfile: 1024
    # Pose inicial del sensor
    pose:
      position: [0, 0, 0]      # [x, y, z] en coordenadas del mundo
      rotation: [0, 0, 0]       # [rotX, rotY, rotZ] en grados (euler angles)
    # ROI (Region of Interest) - define el área de escaneo
    roi:
      yMax: 0.05               # Límite superior en Y
      yMin: -0.025             # Límite inferior en Y
      x0: -0.15               # Límite izquierdo inferior
      x1: -0.135              # Límite izquierdo superior
      x2: 0.135               # Límite derecho superior
      x3: 0.15                # Límite derecho inferior
    # Movimientos del sensor (opcional)
    movements: []              # Sin movimientos para este sensor

  # Sensor 2: Sensor con rotación durante el escaneo
  - id: 'sensor_2'
    model: '/models/gocator.glb'
    # scale: 1.0  # Factor de escala opcional para este sensor (por defecto 1.0)
    pointsPerProfile: 1024
    pose:
      position: [0.5, 0, 0]    # Sensor desplazado en X
      rotation: [0, 45, 0]      # Rotado 45 grados en Y
    roi:
      yMax: 0.05
      yMin: -0.025
      x0: -0.15
      x1: -0.135
      x2: 0.135
      x3: 0.15
    movements:
      # Rotación alrededor del eje Z durante el escaneo
      - type: 'rotation'
        axis: 'z'              # Eje de rotación: 'x', 'y', o 'z'
        value: 90              # Grados totales de rotación
        duration: 4096          # Número de perfiles durante los que se aplica
        startProfile: 0         # Perfil en el que comienza (opcional, por defecto 0)

  # Sensor 3: Sensor con traslación
  - id: 'sensor_3'
    model: '/models/gocator.glb'
    # scale: 1.0  # Factor de escala opcional para este sensor (por defecto 1.0)
    pointsPerProfile: 512      # Menor resolución para este sensor
    pose:
      position: [-0.5, 0.2, 0] # Sensor en posición diferente
      rotation: [0, -45, 0]     # Rotado -45 grados en Y
    roi:
      yMax: 0.04               # ROI más pequeño
      yMin: -0.02
      x0: -0.12
      x1: -0.11
      x2: 0.11
      x3: 0.12
    movements:
      # Traslación en Y durante el escaneo
      - type: 'translation'
        axis: 'y'              # Eje de traslación: 'x', 'y', o 'z'
        value: 0.1             # Distancia total de traslación
        duration: 2048          # Durante la primera mitad del escaneo
        startProfile: 0
      # Rotación simultánea alrededor de X
      - type: 'rotation'
        axis: 'x'
        value: 30
        duration: 2048
        startProfile: 0

# ----------------------------------------------------------------------------
# CONFIGURACIÓN DEL OBJETO
# ----------------------------------------------------------------------------
object:
  # Pose inicial del objeto
  initialPose:
    position: [0, -0.25, 0]    # [x, y, z] en coordenadas del mundo
    rotation: [0, 0, 0]        # [rotX, rotY, rotZ] en grados
  
  # Movimientos del objeto durante el escaneo
  movements:
    # Ejemplo 1: Rotación simple alrededor del eje X (caso típico)
    - type: 'rotation'
      axis: 'x'                # Eje de rotación
      value: 360               # Grados totales de rotación
      duration: 4096           # Debe coincidir con totalProfiles
      startProfile: 0          # Comienza desde el perfil 0
    
    # Ejemplo 2: Rotación en múltiples ejes (comentado)
    # - type: 'rotation'
    #   axis: 'y'
    #   value: 180
    #   duration: 4096
    #   startProfile: 0
    
    # Ejemplo 3: Traslación durante el escaneo (comentado)
    # - type: 'translation'
    #   axis: 'z'
    #   value: 0.5
    #   duration: 4096
    #   startProfile: 0
    
    # Ejemplo 4: Movimiento secuencial (comentado)
    # Primero rotación, luego traslación
    # - type: 'rotation'
    #   axis: 'x'
    #   value: 180
    #   duration: 2048
    #   startProfile: 0
    # - type: 'translation'
    #   axis: 'y'
    #   value: 0.2
    #   duration: 2048
    #   startProfile: 2048

# ----------------------------------------------------------------------------
# CONFIGURACIÓN DE SIMULACIÓN
# ----------------------------------------------------------------------------
simulation:
  intersectionMethod: 'face'   # Método de intersección: 'edge' o 'face'
  # 'edge': intersección solo con aristas de triángulos
  # 'face': intersección con toda la superficie de triángulos
  
  # Parámetros de escaneo por defecto (pueden ser sobrescritos desde la UI)
  defaultRotationDeg: 360      # Grados totales de rotación por defecto
  defaultProfiles: 4096        # Número de perfiles
  offsetZ: 0.001              # Offset Z para reconstrucción (desplazamiento entre perfiles)

# ============================================================================
# NOTAS Y EJEMPLOS ADICIONALES
# ============================================================================
#
# MOVIMIENTOS SIMULTÁNEOS:
# Puedes definir múltiples movimientos que se aplican al mismo tiempo.
# Por ejemplo, rotación en X y traslación en Y simultáneamente:
#
#   movements:
#     - type: 'rotation'
#       axis: 'x'
#       value: 360
#       duration: 4096
#       startProfile: 0
#     - type: 'translation'
#       axis: 'y'
#       value: 0.1
#       duration: 4096
#       startProfile: 0
#
# MOVIMIENTOS SECUENCIALES:
# Para movimientos que ocurren uno después del otro, usa startProfile:
#
#   movements:
#     - type: 'rotation'
#       axis: 'x'
#       value: 180
#       duration: 2048
#       startProfile: 0
#     - type: 'rotation'
#       axis: 'y'
#       value: 180
#       duration: 2048
#       startProfile: 2048
#
# ROI (REGION OF INTEREST):
# El ROI define un trapecio en el plano láser del sensor:
#
#        x1           x2
#        +-------------+      yMax (arriba)
#       /               \
#      /                 \
#     /                   \
#    +---------------------+  yMin (abajo)
#   x0                     x3
#
# Los puntos fuera de este trapecio no se capturan.
#
# COORDENADAS:
# - Las coordenadas están en el sistema de referencia del mundo
# - Las rotaciones se especifican en grados (euler angles)
# - El orden de rotación es XYZ
#
# ============================================================================

